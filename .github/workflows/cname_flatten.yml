name: cname_flatten

on:
  workflow_dispatch:
  schedule:
    # 分钟 小时 日期 月份 星期（0-6）//0代表星期天
    - cron: '*/5 * * * *'

jobs:
  run-it:
    runs-on: ubuntu-latest
    name: cname_flatten
    steps:
      - name: flatten
        run: |
          fetch(){
            curl --connect-timeout 60 --max-time 300 --retry 10 --retry-delay 0 https://cname-flatten.fly.dev/$1
          }
          fcname(){
            fetch A/$1 &
            fetch AAAA/$1 &
            wait
          }
          set -ex
          fcname i18n.site/i18n.site.a.bdydns.com/user0.cf
          fcname 3ti.site/3ti.site.s2-web.dogedns.com/u-01.eu.org
