name: cname_flatten

env:
  TZ: Asia/Shanghai

on:
  workflow_dispatch:
  schedule:
    # 分钟 小时 日期 月份 星期（0-6）//0代表星期天
    - cron: '0 * * * *'
    - cron: '15 * * * *'
    - cron: '30 * * * *'
    - cron: '45 * * * *'
    - cron: '59 * * * *'
  push:
    branches: [ main ]
    paths:
      - 'cname_flatten/**'
      - '.github/workflows/cname_flatten.yml'
      - '.github/workflows/cron.yml'

jobs:
  cname_flatten:
    uses: ./.github/workflows/cron.yml
    with:
      name: cname_flatten
    secrets: inherit
